<!DOCTYPE html>
<html>
<head><title>Affiliate Autopilot Dashboard</title><style>body{font-family:system-ui;padding:20px}button{padding:12px 24px;margin:8px}pre{background:#f8f8f8;padding:10px}</style></head>
<body>
<h1>Affiliate Autopilot Dashboard</h1>
<input id="groq" placeholder="GROQ_API_KEY" style="width:400px"/>
<button onclick="saveKeys()">Store Keys</button>
<button onclick="aiTakeOver()">AI TAKE OVER</button>
<button onclick="loadDashboard()">Refresh Dashboard</button>
<div id="dash"></div>
<div id="output"></div>
<script>
async function saveKeys(){await fetch('/api/keys',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({groq:document.getElementById('groq').value})});}
async function aiTakeOver(){const r=await fetch('/api/auto',{method:'POST'});document.getElementById('output').innerHTML='<pre>'+JSON.stringify(await r.json(),null,2)+'</pre>';}
async function loadDashboard(){const r=await fetch('/api/dashboard');document.getElementById('dash').innerHTML='<pre>'+JSON.stringify(await r.json(),null,2)+'</pre>';}
</script>
</body>
</html>
